---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: rpms-signature-scan
  labels:
    app.kubernetes.io/version: "0.2.2"
spec:
  description: |-
    Scans RPMs in an image and provide information about RPMs signatures.
  params:
    - name: image-url
      type: string
      description: Image URL
    - name: image-digest
      type: string
      description: Image digest to scan
    - name: workdir
      type: string
      default: /tmp
      description: |
        Directory that will be used for storing temporary
        files produced by this task.
    - name: ca-trust-config-map-name
      type: string
      description: The name of the ConfigMap to read CA bundle data from.
      default: trusted-ca
    - name: ca-trust-config-map-key
      type: string
      description: The name of the key in the ConfigMap that contains the CA bundle data.
      default: ca-bundle.crt
  results:
    - name: TEST_OUTPUT
      description: Tekton task test output.
    - name: RPMS_DATA
      description: Information about signed and unsigned RPMs
    - name: IMAGES_PROCESSED
      description: Images processed in the task.
  volumes:
    - name: workdir
      emptyDir: {}
    - name: trusted-ca
      configMap:
        name: $(params.ca-trust-config-map-name)
        items:
          - key: $(params.ca-trust-config-map-key)
            path: ca-bundle.crt
        optional: true
  steps:
    - name: rpms-signature-scan
      image: quay.io/konflux-ci/tools@sha256:7f586ca8dda0dcabec5561936b3c785888d358f520cd1298c7aff338a8f0adc5
      computeResources:
        limits:
          memory: 256Mi
          cpu: 200m
        requests:
          memory: 256Mi
          cpu: 200m
      volumeMounts:
        - name: workdir
          mountPath: "$(params.workdir)"
        - name: trusted-ca
          mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
          subPath: ca-bundle.crt
          readOnly: true
      env:
        - name: IMAGE_URL
          value: "$(params.image-url)"
        - name: IMAGE_DIGEST
          value: "$(params.image-digest)"
        - name: WORKDIR
          value: "$(params.workdir)"
      script: |
        #!/bin/bash
        set -euo pipefail

        retry_on_transient() {
          local max_retries="${RETRY_MAX:-3}"
          local base_delay=5
          local max_delay=60
          local attempt=0
          local exit_code=0
          local stderr_file
          stderr_file=$(mktemp)

          while [ "$attempt" -le "$max_retries" ]; do
            exit_code=0
            "$@" 2>"$stderr_file" || exit_code=$?

            if [ "$exit_code" -eq 0 ]; then
              rm -f "$stderr_file"
              return 0
            fi

            cat "$stderr_file" >&2

            if grep -qiE '502 Bad Gateway|503 Service|429|connection reset|connection refused|Could not resolve host|unexpected end of JSON|timeout|ETIMEDOUT' "$stderr_file"; then
              attempt=$((attempt + 1))
              if [ "$attempt" -gt "$max_retries" ]; then
                echo "ERROR: Transient error persisted after $max_retries retries" >&2
                rm -f "$stderr_file"
                return "$exit_code"
              fi
              local delay=$(( base_delay * (1 << (attempt - 1)) + (RANDOM % 4) ))
              [ "$delay" -gt "$max_delay" ] && delay=$max_delay
              echo "WARNING: Transient error detected (attempt $attempt/$max_retries). Retrying in ${delay}s..." >&2
              sleep "$delay"
            else
              rm -f "$stderr_file"
              return "$exit_code"
            fi
          done

          rm -f "$stderr_file"
          return "$exit_code"
        }

        retry_on_transient rpm_verifier \
          --image-url "${IMAGE_URL}" \
          --image-digest "${IMAGE_DIGEST}" \
          --workdir "${WORKDIR}" \
    - name: output-results
      image: quay.io/konflux-ci/konflux-test:v1.4.50@sha256:8b9c7be18bef49f60ac9926830174072cc2010c620c7b3d0a5bb53ba02fcf71d
      computeResources:
        limits:
          memory: 32Mi
          cpu: 50m
        requests:
          memory: 32Mi
          cpu: 50m
      volumeMounts:
        - name: workdir
          mountPath: "$(params.workdir)"
      env:
        - name: WORKDIR
          value: "$(params.workdir)"
      script: |
        #!/bin/bash
        set -ex

        source /utils.sh
        status=$(cat "${WORKDIR}"/status)
        rpms_data=$(cat "${WORKDIR}"/results)
        images_processed=$(cat "${WORKDIR}"/images_processed)

        if [ "$status" == "ERROR" ]; then
          note="Task $(context.task.name) failed to scan images. Refer to Tekton task output for details"
        else
          note="Task $(context.task.name) completed successfully"
        fi

        TEST_OUTPUT=$(make_result_json -r "$status" -t "$note")

        echo "${TEST_OUTPUT}" | tee "$(results.TEST_OUTPUT.path)"
        echo "${rpms_data}" | tee "$(results.RPMS_DATA.path)"
        echo "${images_processed}" | tee "$(results.IMAGES_PROCESSED.path)"
